name: spatial-tls
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.10
  - jupyter
  - jupyterlab
  - notebook

  # Core single-cell / spatial
  - scanpy>=1.9
  - anndata>=0.9
  - squidpy>=1.3

  # Scientific computing
  - numpy>=1.23
  - pandas>=1.5
  - scipy>=1.9
  - scikit-learn>=1.1

  # Visualization
  - matplotlib>=3.6
  - seaborn>=0.12

  # Graph / clustering
  - leidenalg
  - python-igraph

  # File formats
  - h5py
  - hdf5

  - pip
  - pip:
      # Batch correction
      - harmonypy

      # Deconvolution (Module 3)
      - cell2location

      # Optional: deep learning deconvolution
      # - scvi-tools

# ── How to use ──
# conda env create -f environment.yml
# conda activate spatial-tls
# jupyter lab
